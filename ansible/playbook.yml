- hosts: localhost
  become: yes
  gather_facts: yes
  vars:
    packages:
      - build-essential
      - git
      - curl
      - wget
      - vim
      - nano
      - htop
      - tree
      - zip
      - unzip
      - p7zip-full
      - net-tools
      - dnsutils
      - iputils-ping
      - socat
      - netcat-openbsd
      - jq
      - zsh
      - openssh-server
      - webp
      - locales
      - fonts-noto-cjk
      - tzdata
      - ca-certificates
      - gnupg
      - openssh-client

  tasks:
    - name: 备份原有软件源
      copy:
        src: /etc/apt/sources.list
        dest: "/etc/apt/sources.list.bak.{{ ansible_date_time.epoch }}"
        remote_src: yes
      ignore_errors: yes

    - name: 配置腾讯云镜像源
      copy:
        src: files/apt-sources.list
        dest: /etc/apt/sources.list

    - name: 更新软件包列表
      apt:
        update_cache: yes

    - name: Hold openssh-server（防止其本身被升级）
      dpkg_selections:
        name: openssh-server
        selection: hold

    - name: 阻止 apt 升级期间自动重启服务
      copy:
        dest: /usr/sbin/policy-rc.d
        content: |
          #!/bin/sh
          exit 101
        mode: '0755'

    - name: 升级已安装软件包
      apt:
        upgrade: yes
        dpkg_options: 'force-confdef,force-confold'

    - name: 恢复服务自动重启策略
      file:
        path: /usr/sbin/policy-rc.d
        state: absent

    - name: 解除 openssh-server hold
      dpkg_selections:
        name: openssh-server
        selection: install

    - name: 安装常用工具
      apt:
        name: "{{ packages }}"
        state: present

    - name: 启用 zh_CN.UTF-8 locale
      locale_gen:
        name: zh_CN.UTF-8
        state: present

    - name: 启用 en_US.UTF-8 locale
      locale_gen:
        name: en_US.UTF-8
        state: present

    - name: 配置系统 locale
      copy:
        src: files/default-locale
        dest: /etc/default/locale

    - name: 配置时区
      timezone:
        name: Asia/Shanghai

    - name: 创建 apt keyrings 目录
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: 添加 Docker GPG key
      shell: |
        curl -fsSL https://mirrors.cloud.tencent.com/docker-ce/linux/debian/gpg | \
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: 获取 dpkg 架构
      command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: 添加 Docker 软件源
      apt_repository:
        repo: "deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.gpg] https://mirrors.cloud.tencent.com/docker-ce/linux/debian bookworm stable"
        filename: docker

    - name: 更新 apt 缓存（添加 Docker 源后）
      apt:
        update_cache: yes

    - name: 安装 Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: 启动 Docker 服务
      service:
        name: docker
        state: started
        enabled: yes

    - name: 将当前用户加入 docker 组
      user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes

    - name: 创建 workspace 目录
      file:
        path: "{{ ansible_env.HOME }}/workspace"
        state: directory

    - name: 确保 .ssh 目录存在
      file:
        path: "{{ ansible_env.HOME }}/.ssh"
        state: directory
        mode: '0700'

    - name: 检查是否已有 authorized_keys
      stat:
        path: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
      register: auth_keys_stat

    - name: 生成 SSH key（仅当无现有密钥时）
      command: ssh-keygen -t ed25519 -f "{{ ansible_env.HOME }}/.ssh/id_ed25519" -N "" -C "devbox@{{ ansible_hostname }}"
      args:
        creates: "{{ ansible_env.HOME }}/.ssh/id_ed25519"
      when: not (auth_keys_stat.stat.exists and auth_keys_stat.stat.size > 0)

    - name: 添加新生成的公钥到 authorized_keys
      authorized_key:
        user: "{{ ansible_user_id }}"
        key: "{{ lookup('file', ansible_env.HOME + '/.ssh/id_ed25519.pub') }}"
        state: present
      when: not (auth_keys_stat.stat.exists and auth_keys_stat.stat.size > 0)

    - name: 设置 SSH 文件权限
      file:
        path: "{{ item.path }}"
        mode: "{{ item.mode }}"
        state: "{{ item.state | default('file') }}"
      loop:
        - { path: "{{ ansible_env.HOME }}/.ssh", mode: '0700', state: 'directory' }
        - { path: "{{ ansible_env.HOME }}/.ssh/authorized_keys", mode: '0644' }
        - { path: "{{ ansible_env.HOME }}/.ssh/id_ed25519", mode: '0600' }
        - { path: "{{ ansible_env.HOME }}/.ssh/id_ed25519.pub", mode: '0644' }
      ignore_errors: yes

    - name: 启动 Devbox
      shell: docker compose -f "{{ playbook_dir }}/../docker-compose.yml" up -d

    - name: 等待容器启动
      shell: sleep 3
      changed_when: false

    - name: 准备注入容器的公钥文件
      copy:
        src: "{{ ansible_env.HOME }}/.ssh/{{ 'authorized_keys' if (auth_keys_stat.stat.exists and auth_keys_stat.stat.size > 0) else 'id_ed25519.pub' }}"
        dest: /tmp/devbox_authorized_keys
        remote_src: yes

    - name: 配置容器内 SSH 密钥认证
      shell: |
        docker exec devbox mkdir -p /root/.ssh
        cat /tmp/devbox_authorized_keys | docker exec -i devbox bash -c 'cat > /root/.ssh/authorized_keys'
        docker exec devbox chmod 700 /root/.ssh
        docker exec devbox chmod 600 /root/.ssh/authorized_keys
        docker exec devbox chown -R root:root /root/.ssh
      ignore_errors: yes

    - name: 禁用容器内 SSH 密码登录
      shell: |
        docker exec devbox sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
        docker exec devbox sed -i 's/^#*PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
        docker exec devbox service ssh restart
      ignore_errors: yes

    - name: 安装 Oh My Zsh
      git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh"
        depth: 1

    - name: 安装 zsh-autosuggestions 插件
      git:
        repo: https://github.com/zsh-users/zsh-autosuggestions.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
        depth: 1

    - name: 安装 zsh-syntax-highlighting 插件
      git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
        depth: 1

    - name: 配置 .zshrc
      copy:
        src: files/zshrc
        dest: "{{ ansible_env.HOME }}/.zshrc"

    - name: 获取 zsh 路径
      command: which zsh
      register: zsh_path
      changed_when: false

    - name: 切换默认 shell 为 zsh
      user:
        name: "{{ ansible_user_id }}"
        shell: "{{ zsh_path.stdout }}"

    - name: 验证 locale
      command: locale
      register: locale_output
      changed_when: false

    - name: 验证时区
      command: timedatectl
      register: timezone_output
      changed_when: false

    - name: 获取公网 IP
      shell: |
        curl -fsSL --max-time 3 https://api.ip.sb/ip 2>/dev/null || \
        curl -fsSL --max-time 3 https://api64.ipify.org 2>/dev/null || \
        echo ""
      register: public_ip
      changed_when: false

    - name: 验证 Docker
      command: docker --version
      register: docker_version
      changed_when: false

    - name: 验证 Devbox
      shell: docker ps | grep -q devbox
      register: devbox_running
      changed_when: false
      ignore_errors: yes

    - name: 显示验证结果
      debug:
        msg:
          - "Shell: {{ zsh_path.stdout }}"
          - "Locale: {{ locale_output.stdout_lines | select('search', 'LANG=') | first | default('未获取') }}"
          - "时区: {{ timezone_output.stdout_lines | select('search', 'Time zone') | first | default('未获取') }}"
          - "Docker: {{ docker_version.stdout }}"
          - "Devbox: {{ '运行中' if (devbox_running.rc | default(1)) == 0 else '未启动' }}"
          - ""
          - "========================================"
          - "  初始化完成"
          - "========================================"
          - ""
          - "【SSH 连接容器开发指南】"
          - ""
          - "Host: {{ public_ip.stdout | default(ansible_default_ipv4.address, true) }}"
          - "Port: 36000"
          - "User: root"
          - ""
          - "{% if auth_keys_stat.stat.exists and auth_keys_stat.stat.size > 0 %}"
          - "使用已有私钥直接连接容器:"
          - "   ssh -p 36000 root@{{ public_ip.stdout | default(ansible_default_ipv4.address, true) }}"
          - ""
          - "IDE 配置使用你登录宿主机的同一套 SSH Key"
          - "{% else %}"
          - "Step 1: 下载私钥到本地电脑"
          - "   scp root@{{ public_ip.stdout | default(ansible_default_ipv4.address, true) }}:/root/.ssh/id_ed25519 ~/.ssh/devbox_key"
          - "   chmod 600 ~/.ssh/devbox_key"
          - ""
          - "Step 2: 在 IDE 中配置 SSH 连接"
          - "   Auth: SSH Key -> ~/.ssh/devbox_key"
          - "{% endif %}"
          - ""
          - "支持的 IDE: Codebuddy / VSCode (Remote-SSH) / JetBrains Gateway"
          - ""
          - "========================================"
          - ""
          - "提示: 重新登录 SSH 以使用 zsh + Oh My Zsh"
          - "      容器内环境崩溃只需 docker compose restart devbox 即可恢复"