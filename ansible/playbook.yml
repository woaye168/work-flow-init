- hosts: localhost
  become: yes
  gather_facts: yes
  vars:
    packages:
      - build-essential
      - git
      - curl
      - wget
      - vim
      - nano
      - htop
      - tree
      - zip
      - unzip
      - p7zip-full
      - net-tools
      - dnsutils
      - iputils-ping
      - socat
      - netcat-openbsd
      - jq
      - zsh
      - openssh-server
      - webp
      - locales
      - fonts-noto-cjk
      - tzdata
      - ca-certificates
      - gnupg
      - openssh-client

  tasks:
    - name: 备份原有软件源
      copy:
        src: /etc/apt/sources.list
        dest: "/etc/apt/sources.list.bak.{{ ansible_date_time.epoch }}"
        remote_src: yes
      ignore_errors: yes

    - name: 配置腾讯云镜像源
      copy:
        src: files/apt-sources.list
        dest: /etc/apt/sources.list

    - name: 更新软件包列表
      apt:
        update_cache: yes

    - name: Hold openssh-server（防止其本身被升级）
      dpkg_selections:
        name: openssh-server
        selection: hold

    - name: 阻止 apt 升级期间自动重启服务
      copy:
        dest: /usr/sbin/policy-rc.d
        content: |
          #!/bin/sh
          exit 101
        mode: '0755'

    - name: 升级已安装软件包
      apt:
        upgrade: yes
        dpkg_options: 'force-confdef,force-confold'

    - name: 恢复服务自动重启策略
      file:
        path: /usr/sbin/policy-rc.d
        state: absent

    - name: 添加 GitHub CLI apt 源
      shell: |
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
        dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch={{ dpkg_arch.stdout }} signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | \
        tee /etc/apt/sources.list.d/github-cli.list
      args:
        creates: /etc/apt/sources.list.d/github-cli.list

    - name: 安装 GitHub CLI
      apt:
        name: gh
        state: present
        update_cache: yes

    - name: 解除 openssh-server hold
      dpkg_selections:
        name: openssh-server
        selection: install

    - name: 安装常用工具
      apt:
        name: "{{ packages }}"
        state: present

    - name: 启用 zh_CN.UTF-8 locale
      locale_gen:
        name: zh_CN.UTF-8
        state: present

    - name: 启用 en_US.UTF-8 locale
      locale_gen:
        name: en_US.UTF-8
        state: present

    - name: 配置系统 locale
      copy:
        src: files/default-locale
        dest: /etc/default/locale

    - name: 配置时区
      timezone:
        name: Asia/Shanghai

    - name: 创建 apt keyrings 目录
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: 添加 Docker GPG key
      shell: |
        curl -fsSL https://mirrors.cloud.tencent.com/docker-ce/linux/debian/gpg | \
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: 获取 dpkg 架构
      command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: 添加 Docker 软件源
      apt_repository:
        repo: "deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.gpg] https://mirrors.cloud.tencent.com/docker-ce/linux/debian bookworm stable"
        filename: docker

    - name: 更新 apt 缓存（添加 Docker 源后）
      apt:
        update_cache: yes

    - name: 安装 Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: 启动 Docker 服务
      service:
        name: docker
        state: started
        enabled: yes

    - name: 将当前用户加入 docker 组
      user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes

    - name: 创建 workspace 目录
      file:
        path: "{{ ansible_env.HOME }}/workspace"
        state: directory

    - name: 设置 .ssh 目录权限
      file:
        path: "{{ ansible_env.HOME }}/.ssh"
        state: directory
        mode: '0700'

    - name: 设置 authorized_keys 权限
      file:
        path: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
        mode: '0644'

    - name: 启动 Devbox
      shell: docker compose -f "{{ playbook_dir }}/../docker-compose.yml" up -d

    - name: 等待容器启动
      shell: sleep 3
      changed_when: false

    - name: 配置容器内 SSH 密钥认证
      shell: |
        docker exec devbox mkdir -p /root/.ssh
        cat "{{ ansible_env.HOME }}/.ssh/authorized_keys" | docker exec -i devbox bash -c 'cat > /root/.ssh/authorized_keys'
        docker exec devbox chmod 700 /root/.ssh
        docker exec devbox chmod 600 /root/.ssh/authorized_keys
        docker exec devbox chown -R root:root /root/.ssh
      ignore_errors: yes

    - name: 禁用容器内 SSH 密码登录
      shell: |
        docker exec devbox sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
        docker exec devbox sed -i 's/^#*PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
        docker exec devbox service ssh restart
      ignore_errors: yes

    - name: 安装 Oh My Zsh
      git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh"
        depth: 1

    - name: 安装 zsh-autosuggestions 插件
      git:
        repo: https://github.com/zsh-users/zsh-autosuggestions.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
        depth: 1

    - name: 安装 zsh-syntax-highlighting 插件
      git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
        depth: 1

    - name: 配置 .zshrc
      copy:
        src: files/zshrc
        dest: "{{ ansible_env.HOME }}/.zshrc"

    - name: 获取 zsh 路径
      command: which zsh
      register: zsh_path
      changed_when: false

    - name: 切换默认 shell 为 zsh
      user:
        name: "{{ ansible_user_id }}"
        shell: "{{ zsh_path.stdout }}"

    - name: 验证 locale
      command: locale
      register: locale_output
      changed_when: false

    - name: 验证时区
      command: timedatectl
      register: timezone_output
      changed_when: false

    - name: 获取公网 IP
      shell: |
        curl -fsSL --max-time 3 https://api.ip.sb/ip 2>/dev/null || \
        curl -fsSL --max-time 3 https://api64.ipify.org 2>/dev/null || \
        echo ""
      register: public_ip
      changed_when: false

    - name: 验证 Docker
      command: docker --version
      register: docker_version
      changed_when: false

    - name: 验证 Devbox
      shell: docker ps | grep -q devbox
      register: devbox_running
      changed_when: false
      ignore_errors: yes

    - name: 安装项目同步命令
      copy:
        src: files/project.sh
        dest: /usr/local/bin/project
        mode: '0755'

    - name: 显示验证结果
      debug:
        msg:
          - "========================================"
          - "  初始化完成"
          - "========================================"
          - ""
          - "Shell:   {{ zsh_path.stdout }}"
          - "Docker:  {{ docker_version.stdout }}"
          - "Devbox:  {{ '运行中' if (devbox_running.rc | default(1)) == 0 else '未启动' }}"
          - ""
          - "容器 SSH: ssh -p 36000 root@{{ public_ip.stdout | default(ansible_default_ipv4.address, true) }}"
          - ""
          - "使用登录宿主机的同一套 SSH Key"
          - ""
          - "重新登录 SSH 以使用 zsh"
